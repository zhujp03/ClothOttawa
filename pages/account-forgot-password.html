<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Luxury Station</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <div id="site-header"></div>
  <main class="page-shell">
    <section class="auth-shell customer-auth-shell">
      <form class="auth-card" id="forgot-password-form">
        <p class="hero-kicker">ACCOUNT SECURITY</p>
        <h1>Reset your password</h1>
        <p class="checkout-subline">Verify with email + phone + postal code.</p>
        <p id="forgot-error" class="admin-error" style="display:none;"></p>
        <p id="forgot-success" class="admin-success" style="display:none;"></p>

        <label>Email
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label>Phone
          <input name="phone" required />
        </label>
        <label>Postal Code
          <input name="postalCode" required />
        </label>
        <label>New Password
          <input type="password" name="newPassword" minlength="8" maxlength="72" autocomplete="new-password" required />
        </label>

        <button type="submit">Reset Password</button>
        <p class="auth-foot-note"><a href="/account/login" class="inline-link">Back to Log In</a></p>
      </form>
    </section>
  </main>
  <script type="module" src="/scripts/account-forgot-password.js"></script>
</body>
</html>
